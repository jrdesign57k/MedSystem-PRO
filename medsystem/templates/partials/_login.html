<div id="login-screen">
  <div class="login-left">
    <div class="login-brand">
      <div class="login-brand-icon">
        <img src="/static/v10/MedSystem.png" alt="MedSystem"/>
      </div>
      <div>
        <div class="login-brand-name">MedSystem PRO</div>
        <div class="login-brand-sub">Sistema Médico Profissional</div>
      </div>
    </div>
    <div class="login-headline">Gestão clínica<br/><span>completa e</span><br/>eficiente.</div>
    <div class="login-desc">Pacientes, consultas, exames, prontuários, financeiro e equipe — tudo em um só lugar.</div>
  </div>
  <div class="login-right">
    <div class="login-card">
      <div class="login-card-title">Bem-vindo 👋</div>
      <div class="login-card-sub">Acesse sua conta MedSystem PRO</div>
      <div id="login-error" class="login-error" style="display:none;"></div>
      <div class="login-field">
        <label>E-mail</label>
        <input type="email" id="login-email" value="medico@medsystem.com" onkeydown="if(event.key==='Enter')doLogin()"/>
      </div>
      <div class="login-field">
        <label>Senha</label>
        <input type="password" id="login-senha" value="MedSystem12#" onkeydown="if(event.key==='Enter')doLogin()"/>
      </div>
      <button class="login-btn" type="button" onclick="doLogin()" id="login-btn">
        <svg viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg>
        Entrar no sistema
      </button>
      <div class="login-footer">MedSystem PRO v2 · © 2026</div>
    </div>
  </div>
</div>
