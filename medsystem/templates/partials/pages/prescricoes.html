<div id="page-prescricoes" class="page">
  <div class="page-header">
    <div><div class="page-title">Prescrições</div><div class="page-sub">Emissão e histórico de receituários</div></div>
    <div class="header-actions no-print">
      <button class="btn btn-primary" onclick="openModal('modal-prescricao')">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>Nova Prescrição
      </button>
    </div>
  </div>

  <div class="two-col">
    <div class="card">
      <div class="card-header"><span class="card-title">Nova Prescrição</span></div>
      <div class="card-body">
        <div class="form-grid" style="margin-bottom:14px">
          <div class="form-group"><label>Paciente <span class="req">*</span></label>
            <select id="rx-paciente-select"><option value="">Carregando pacientes...</option></select>
          </div>
          <div class="form-group"><label>Tipo de Receita</label>
            <select id="rx-tipo-select">
              <option>Simples</option>
              <option>Controlada Azul</option>
              <option>Controlada Amarela</option>
            </select>
          </div>
        </div>

        <div style="border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:14px">
          <div style="background:var(--surface2);padding:10px 14px;font-size:12px;font-weight:700;color:var(--text2);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
            MEDICAMENTOS
            <button class="btn btn-ghost btn-sm no-print" onclick="addMed()">+ Adicionar</button>
          </div>
          <div style="padding:12px 14px" id="med-list">
            <div class="rx-item" style="margin-bottom:8px;display:flex;gap:8px;align-items:flex-start">
              <div style="flex:1">
                <div class="form-grid-3" style="gap:8px">
                  <div class="form-group"><label>Medicamento</label><input class="rx-med-nome" placeholder="Ex: Ibuprofeno 400mg"/></div>
                  <div class="form-group"><label>Posologia</label><input class="rx-med-pos" placeholder="Ex: 1 comp. 8/8h"/></div>
                  <div class="form-group"><label>Duração</label><input class="rx-med-dur" placeholder="Ex: 7 dias"/></div>
                </div>
              </div>
              <button class="btn btn-ghost btn-sm no-print" style="color:var(--red-light);margin-top:18px" onclick="this.closest('.rx-item').remove()">✕</button>
            </div>
          </div>
        </div>

        <div class="form-group mb16"><label>Observações / Orientações</label><textarea id="rx-orientacoes" placeholder="Informações adicionais ao paciente..."></textarea></div>
        <div class="flex-end no-print">
          <button type="button" class="btn btn-outline" onclick="salvarRascunhoReceita()">Salvar Rascunho</button>
          <button type="button" class="btn btn-success" id="btn-gerar-receita" onclick="emitirReceita(false)">
            <svg viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>Gerar &amp; Imprimir
          </button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header"><span class="card-title">Receituários Emitidos</span></div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>#</th><th>Paciente</th><th>Data</th><th>Medicamentos</th><th>Tipo</th><th></th></tr></thead>
          <tbody id="rx-historico-tbody">
            <tr><td colspan="6" class="text-sm text-3">Carregando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
