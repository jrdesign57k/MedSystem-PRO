<div id="page-mensagens" class="page">
  <div class="page-header">
    <div><div class="page-title">Mensagens Internas</div><div class="page-sub">Comunicação segura da equipe</div></div>
  </div>
  <div class="col-32">
    <!-- Lista de conversas -->
    <div class="card" style="height:520px;display:flex;flex-direction:column">
      <div class="card-header"><span class="card-title">Conversas</span></div>
      <div style="flex:1;overflow-y:auto" id="chat-list">
        <div style="padding:16px;color:#999;text-align:center">Carregando conversas...</div>
      </div>
    </div>

    <!-- Chat -->
    <div class="card" style="height:520px;display:flex;flex-direction:column">
      <div class="card-header">
        <div style="display:flex;align-items:center;gap:10px">
          <div class="avatar avatar-green" style="width:32px;height:32px;font-size:12px">AF</div>
          <div><div class="card-title" id="chat-header-name">Selecione uma conversa</div><div class="card-sub">Mensagens internas</div></div>
        </div>
      </div>
      <div style="flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px" id="chat-body">
        <div style="color:#999;text-align:center;padding:20px">Selecione uma conversa à esquerda</div>
      </div>
      <div style="padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px">
        <input id="msg-input" placeholder="Escreva uma mensagem..." style="flex:1" onkeydown="if(event.key==='Enter')sendMsg()"/>
        <button class="btn btn-primary btn-sm" onclick="sendMsg()">Enviar</button>
      </div>
    </div>
  </div>
</div>
