<div id="page-equipe" class="page">
  <div class="page-header">
    <div><div class="page-title">Usuários & Equipe</div><div class="page-sub">Gestão de acessos e profissionais</div></div>
    <div class="header-actions" id="equipe-acoes-criar" style="display:none">
      <button class="btn btn-primary" onclick="toggleFormUsuario(true)">+ Novo Usuário</button>
    </div>
  </div>

  <div class="card mb16" id="form-usuario-box" style="display:none">
    <div class="card-header"><span class="card-title">Cadastrar novo usuário</span></div>
    <div class="card-body">
      <div class="form-grid">
        <div class="form-group"><label>Nome <span class="req">*</span></label><input id="nu-nome" type="text" placeholder="Nome completo"/></div>
        <div class="form-group"><label>E-mail <span class="req">*</span></label><input id="nu-email" type="email" placeholder="email@medsystem.com"/></div>
        <div class="form-group"><label>Senha <span class="req">*</span></label><input id="nu-senha" type="password" placeholder="Mín. 8 caracteres"/></div>
        <div class="form-group">
          <label>Perfil <span class="req">*</span></label>
          <select id="nu-tipo" onchange="toggleCamposMedicoUsuario()">
            <option value="recepcao">Recepção</option>
            <option value="medico">Médico</option>
            <option value="admin" id="nu-tipo-admin">Administrador</option>
          </select>
        </div>
        <div class="form-group" id="nu-crm-group" style="display:none"><label>CRM <span class="req">*</span></label><input id="nu-crm" type="text" placeholder="SP123456"/></div>
        <div class="form-group" id="nu-esp-group" style="display:none"><label>Especialidade <span class="req">*</span></label><select id="nu-especialidade"><option value="">Carregando...</option></select></div>
      </div>
      <div style="margin-top:16px;display:flex;gap:8px">
        <button class="btn btn-primary" onclick="novoUsuario()">Salvar usuário</button>
        <button class="btn btn-outline" onclick="toggleFormUsuario(false)">Cancelar</button>
      </div>
    </div>
  </div>

  <div class="card mb16" id="secao-usuarios-sistema" style="display:none">
    <div class="card-header"><span class="card-title">Usuários do sistema</span></div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Nome</th><th>E-mail</th><th>Perfil</th><th>Status</th><th id="th-usuarios-acoes" style="display:none">Ações</th></tr></thead>
        <tbody id="tabela-usuarios">
          <tr><td colspan="5" style="text-align:center;color:var(--text4)">Carregando...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="card">
    <div class="card-header"><span class="card-title">Médicos da equipe</span></div>
    <div class="table-wrap">
      <table id="tabela-equipe">
        <thead><tr><th>Nome</th><th>CRM</th><th>Especialidade</th><th>Status</th></tr></thead>
        <tbody><tr><td colspan="4" style="text-align:center;color:#999;">Carregando equipe...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>
