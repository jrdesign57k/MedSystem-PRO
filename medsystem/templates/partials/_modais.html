<!-- ═══════════════ MODAL: Nova Consulta ═══════════════ -->
<div class="modal-overlay" id="modal-consulta" onclick="if(event.target===this)closeModal('modal-consulta')">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Agendar Consulta</span>
      <button class="btn btn-ghost btn-sm" onclick="closeModal('modal-consulta')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group"><label>Paciente <span class="req">*</span></label>
          <select id="nc-pac"><option value="">Carregando pacientes...</option></select>
        </div>
        <div class="form-group"><label>Médico <span class="req">*</span></label>
          <select id="nc-med"><option value="">Carregando médicos...</option></select>
        </div>
        <div class="form-group"><label>Data <span class="req">*</span></label><input id="nc-data" type="date"/></div>
        <div class="form-group full">
          <label>Horário <span class="req">*</span></label>
          <input type="hidden" id="nc-hora" value=""/>
          <div id="nc-horarios-slots" class="hora-slots-grid">
            <div class="hora-slots-hint">Selecione médico e data para ver os horários</div>
          </div>
        </div>
        <div class="form-group"><label>Tipo de Consulta</label>
          <select id="nc-tipo" onchange="atualizarPreviewPrecoAgendamento()">
            <option value="1ª Consulta">1ª Consulta</option>
            <option value="Retorno">Retorno</option>
            <option value="Urgência">Urgência</option>
          </select>
        </div>
        <div class="form-group"><label>Convênio / Particular</label>
          <select id="nc-convenio" onchange="atualizarPreviewPrecoAgendamento()">
            <option value="Particular">Particular</option>
          </select>
        </div>
        <div class="form-group full">
          <div id="nc-preco-preview" style="padding:10px 14px;background:var(--surface2);border-radius:8px;border:1px solid var(--border);font-size:13px">
            <strong>Valor estimado:</strong> <span id="nc-preco-valor">—</span>
          </div>
        </div>
        <div class="form-group full"><label>Motivo / Queixa Principal <span class="req">*</span></label><input id="nc-motivo" placeholder="Descreva brevemente o motivo da consulta"/></div>
        <div class="form-group full"><label>Observações</label><textarea id="nc-obs" placeholder="Informações adicionais..." style="min-height:60px"></textarea></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modal-consulta')">Cancelar</button>
      <button class="btn btn-primary" onclick="agendarConsultaModal()">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Confirmar Agendamento
      </button>
    </div>
  </div>
</div>

<!-- ═══════════════ MODAL: Detalhe do Agendamento ═══════════════ -->
<div class="modal-overlay" id="modal-agendamento" onclick="if(event.target===this)closeModal('modal-agendamento')">
  <div class="modal" style="max-width:520px">
    <div class="modal-header">
      <span class="modal-title">Detalhes do Agendamento</span>
      <button class="btn btn-ghost btn-sm" onclick="closeModal('modal-agendamento')">✕</button>
    </div>
    <div class="modal-body">
      <div id="agend-detalhe-loading" class="text-sm text-3" style="text-align:center;padding:24px">Carregando...</div>
      <div id="agend-detalhe-conteudo" style="display:none">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
          <div class="patient-avatar-lg" id="agend-avatar">--</div>
          <div>
            <div style="font-weight:700;font-size:17px" id="agend-paciente">—</div>
            <div class="text-sm text-3">Consulta <span class="td-mono" id="agend-numero">#0000</span></div>
          </div>
          <span class="badge badge-amber" id="agend-status" style="margin-left:auto">AGENDADA</span>
        </div>
        <div class="form-grid" style="gap:12px">
          <div class="form-group"><label class="text-xs text-3">Data</label><div id="agend-data" style="font-weight:600">—</div></div>
          <div class="form-group"><label class="text-xs text-3">Horário</label><div id="agend-hora" class="td-mono" style="font-weight:600">—</div></div>
          <div class="form-group"><label class="text-xs text-3">Médico</label><div id="agend-medico" style="font-weight:600">—</div></div>
          <div class="form-group"><label class="text-xs text-3">Tipo</label><div id="agend-tipo">—</div></div>
          <div class="form-group"><label class="text-xs text-3">Convênio</label><div id="agend-convenio">—</div></div>
          <div class="form-group"><label class="text-xs text-3">Telefone</label><div id="agend-telefone">—</div></div>
          <div class="form-group full"><label class="text-xs text-3">Motivo / Queixa</label><div id="agend-motivo" style="padding:10px;background:var(--surface2);border-radius:8px;font-size:13px">—</div></div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modal-agendamento')">Fechar</button>
      <button class="btn btn-outline btn-prontuario" id="agend-btn-prontuario" style="display:none" onclick="fecharAgendamentoAbrirProntuario()">Prontuário</button>
      <button class="btn btn-primary" id="agend-btn-consultas" onclick="fecharAgendamentoVerConsultas()">Ver em Consultas</button>
    </div>
  </div>
</div>

<!-- ═══════════════ MODAL: Nova Prescrição ═══════════════ -->
<div class="modal-overlay" id="modal-prescricao" onclick="if(event.target===this)closeModal('modal-prescricao')">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Nova Prescrição</span>
      <button class="btn btn-ghost btn-sm" onclick="closeModal('modal-prescricao')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid mb16">
        <div class="form-group"><label>Paciente</label><select id="rx-modal-paciente"><option value="">Carregando...</option></select></div>
        <div class="form-group"><label>Tipo de Receita</label><select id="rx-modal-tipo"><option>Simples</option><option>Controlada Azul</option><option>Controlada Amarela</option></select></div>
        <div class="form-group"><label>Medicamento</label><input id="rx-modal-med" placeholder="Nome do medicamento + dosagem"/></div>
        <div class="form-group"><label>Posologia</label><input id="rx-modal-pos" placeholder="Ex: 1 comp. 8/8h"/></div>
        <div class="form-group"><label>Duração</label><input id="rx-modal-dur" placeholder="Ex: 7 dias"/></div>
        <div class="form-group"><label>Quantidade</label><input id="rx-modal-qtd" placeholder="Ex: 21 comprimidos"/></div>
        <div class="form-group full"><label>Orientações ao Paciente</label><textarea id="rx-modal-orient" style="min-height:60px" placeholder="Tome com água, evite álcool..."></textarea></div>
      </div>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn btn-outline" onclick="closeModal('modal-prescricao')">Cancelar</button>
      <button type="button" class="btn btn-outline" onclick="salvarRascunhoReceita(true)">Salvar Rascunho</button>
      <button type="button" class="btn btn-success" id="btn-modal-gerar-receita" onclick="emitirReceita(true)">
        <svg viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>Gerar &amp; Imprimir
      </button>
    </div>
  </div>
</div>
