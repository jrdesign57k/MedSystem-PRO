<header class="topbar">
  <div class="topbar-search" id="topbar-staff-search">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <input placeholder="Buscar paciente por nome ou CPF..." id="globalSearch" autocomplete="off"
           oninput="globalSearchFn(this.value)" onfocus="globalSearchFn(this.value)"/>
    <span class="topbar-search-hint">⌘K</span>
    <div class="search-results" id="globalSearchResults"></div>
  </div>

  <div class="topbar-right">
    <div class="topbar-datetime">
      <div class="topbar-clock" id="relogio">00:00:00</div>
      <div class="topbar-date" id="hoje-top"></div>
    </div>
    <div class="topbar-sep"></div>
    <div class="notif-wrap">
      <button class="topbar-btn" id="notifBtn" type="button" onclick="toggleNotif()" aria-label="Alertas clínicos">
        <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/></svg>
        <span class="notif-dot" id="notifDot" style="display:none"></span>
      </button>
      <div class="notif-panel" id="notifPanel">
        <div class="notif-header">
          <span style="font-size:13px;font-weight:700" id="notif-panel-title">Alertas clínicos</span>
          <span style="font-size:12px;color:var(--blue-mid);cursor:pointer" id="notif-panel-action" onclick="marcarNotificacoesLidas()">Marcar lidas</span>
        </div>
        <div id="notifList">
          <div class="notif-empty">Carregando alertas...</div>
        </div>
      </div>
    </div>
    <button class="topbar-btn" type="button" id="topbar-btn-equipe" onclick="irParaEquipe()" title="Usuários e equipe" aria-label="Usuários e equipe">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 10-16 0"/></svg>
    </button>
  </div>
</header>
